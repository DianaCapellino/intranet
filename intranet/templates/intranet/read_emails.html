{% extends "intranet/layout.html" %}

{% block body %}
{% if user.userType != "Cliente" and user.isAdmin %}
    {% for email in emails %}
        <div>ASUNTO: {{ email.subject }}</div>
        <div>FECHA: {{ email.date }}</div>
        <div>CONTENIDO: {{ email.text }}</div>
        <div>ADJUNTO: {{ email.attachments }}</div>
        <hr>
    {% endfor %}
{% endif %}

{% endblock %}
